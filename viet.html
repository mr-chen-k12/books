<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vietnamese Flashcards</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 480px;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 24px;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  button, select {
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    font-size: 14px;
  }

  button.secondary { background: #666; }
  button.wrong { background: #b00020; }
  button.right { background: #087f23; }

  .card-wrap {
    perspective: 1000px;
    height: 320px;
    touch-action: none;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s ease;
    cursor: pointer;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    background: white;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 28px;
    box-sizing: border-box;
  }

  .front {
    font-size: 30px;
    font-weight: bold;
  }

  .back {
    transform: rotateY(180deg);
    font-size: 30px;
    font-weight: bold;
  }

  .sub {
    margin-top: 12px;
    font-size: 15px;
    color: #555;
    font-weight: normal;
  }

  .small, .hint {
    text-align: center;
    margin-top: 10px;
    color: #555;
    font-size: 13px;
  }
</style>
</head>

<body>
<div class="app">
  <h1>Vietnamese Flashcards</h1>

  <div class="controls">
    <select id="mode">
      <option value="normal">Flip Mode</option>
      <option value="front">Front Only</option>
      <option value="back">Back Only</option>
    </select>

    <button onclick="speakCard()">🔊 Sound</button>
    <button onclick="markRight()" class="right">Got It</button>
    <button onclick="markWrong()" class="wrong">Wrong</button>
    <button onclick="smartReview()" class="secondary">Smart Review</button>
    <button onclick="resetDeck()" class="secondary">All Cards</button>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card" onclick="flipCard()">
      <div class="face front">
        <div>
          <div id="frontText"></div>
          <div class="sub">English</div>
        </div>
      </div>

      <div class="face back">
        <div>
          <div id="backText"></div>
          <div class="sub">Vietnamese</div>
        </div>
      </div>
    </div>
  </div>

  <div class="small" id="counter"></div>
  <div class="hint">Swipe left/right for cards. Swipe up/down to flip.</div>
</div>

<script>
let cards = [
  // Greetings
  { front: "Hello", back: "Xin chào" },
  { front: "Good morning", back: "Chào buổi sáng" },
  { front: "Thank you", back: "Cảm ơn" },
  { front: "Goodbye", back: "Tạm biệt" },
  { front: "How are you?", back: "Bạn khỏe không?" },
  { front: "I am well", back: "Tôi khỏe" },

  // Introducing Yourself
  { front: "My name is Yuyu Chen", back: "Tôi tên là Yuyu Chen" },
  { front: "I am a teacher", back: "Tôi là giáo viên" },

  // Food and Daily Life
  { front: "Lunch / to eat lunch", back: "Ăn trưa" },
  { front: "Have you eaten yet?", back: "Bạn ăn chưa?" },
  { front: "I like chicken", back: "Tôi thích gà" },
  { front: "I like fish", back: "Tôi thích cá" },
  { front: "I like coffee", back: "Tôi thích cà phê" },

  // Numbers 1–10
  { front: "1", back: "Một" },
  { front: "2", back: "Hai" },
  { front: "3", back: "Ba" },
  { front: "4", back: "Bốn" },
  { front: "5", back: "Năm" },
  { front: "6", back: "Sáu" },
  { front: "7", back: "Bảy" },
  { front: "8", back: "Tám" },
  { front: "9", back: "Chín" },
  { front: "10", back: "Mười" },

  // Numbers 11–20
  { front: "11", back: "Mười một" },
  { front: "12", back: "Mười hai" },
  { front: "13", back: "Mười ba" },
  { front: "14", back: "Mười bốn" },
  { front: "15", back: "Mười lăm" },
  { front: "16", back: "Mười sáu" },
  { front: "17", back: "Mười bảy" },
  { front: "18", back: "Mười tám" },
  { front: "19", back: "Mười chín" },
  { front: "20", back: "Hai mươi" },

  // Other Numbers
  { front: "21", back: "Hai mươi mốt" },
  { front: "30", back: "Ba mươi" },
  { front: "31", back: "Ba mươi mốt" },
  { front: "40", back: "Bốn mươi" },

  // Colors
  { front: "Red", back: "Đỏ" },
  { front: "Green or blue, depending on context", back: "Xanh" },
  { front: "Green, specifically", back: "Xanh lá cây" },
  { front: "Yellow", back: "Vàng" },

  // Traffic Lights
  { front: "Red light", back: "Đèn đỏ" },
  { front: "Yellow light", back: "Đèn vàng" },
  { front: "Green light", back: "Đèn xanh" },

  // Transportation
  { front: "Traffic", back: "Giao thông" },
  { front: "Traffic jam", back: "Kẹt xe" },
  { front: "Vehicle / car", back: "Xe" },
  { front: "Fast", back: "Nhanh" },
  { front: "Bridge", back: "Cây cầu" },
  { front: "Tunnel", back: "Đường hầm" },
  { front: "Highway", back: "Cao tốc" },
  { front: "Highway exit", back: "Lối ra cao tốc" },
  { front: "The car is very fast", back: "Chiếc xe rất nhanh" },
  { front: "Airplane", back: "Máy bay" },
  { front: "Police", back: "Cảnh sát" },

  // Nature and Places
  { front: "Tree", back: "Cây" },

  // Safety
  { front: "Dangerous", back: "Nguy hiểm" },
  { front: "The road is dangerous", back: "Con đường nguy hiểm" },
  { front: "The highway is dangerous", back: "Cao tốc nguy hiểm" },

  // Feelings and Conditions
  { front: "I am sleepy", back: "Tôi buồn ngủ" },
  { front: "I am crazy", back: "Tôi điên" },
  { front: "I have gone crazy / I am insane", back: "Tôi bị điên" },
  { front: "I am unlucky", back: "Tôi không may mắn" },

  // Compliments
  { front: "You are silly", back: "Bạn ngốc" },
  { front: "You look nice", back: "Bạn trông đẹp" },
  { front: "You are beautiful", back: "Bạn đẹp quá" },
  {
    front: "You are beautiful, to someone younger or romantically",
    back: "Em đẹp quá"
  },

  // Love
  {
    front: "I love you, male speaking to female",
    back: "Anh yêu em"
  },
  {
    front: "I love you, female speaking to male",
    back: "Em yêu anh"
  },

  // Bathroom
  {
    front: "I want to go to the bathroom",
    back: "Tôi muốn đi vệ sinh"
  },
  { front: "I want to pee", back: "Tôi muốn đi tiểu" },
  {
    front: "I want to poop, formal",
    back: "Tôi muốn đi đại tiện"
  },
  { front: "I peed my pants", back: "Tôi đã tè ra quần" },

  // Time
  { front: "Today", back: "Hôm nay" },
  { front: "It is summertime now", back: "Bây giờ là mùa hè" }
];
 
  
  

let fullDeck = [...cards];
let wrongCards = [];
let index = 0;
let flipped = false;

const card = document.getElementById("card");
const frontText = document.getElementById("frontText");
const backText = document.getElementById("backText");
const counter = document.getElementById("counter");
const mode = document.getElementById("mode");

function renderCard() {
  if (cards.length === 0) return;

  frontText.textContent = cards[index].front;
  backText.textContent = cards[index].back;

  if (mode.value === "front") flipped = false;
  if (mode.value === "back") flipped = true;

  card.classList.toggle("flipped", flipped);
  counter.textContent = `${index + 1} / ${cards.length}`;
}

function flipCard() {
  if (mode.value !== "normal") return;
  flipped = !flipped;
  renderCard();
}

function nextCard() {
  index = (index + 1) % cards.length;
  if (mode.value === "normal") flipped = false;
  renderCard();
}

function prevCard() {
  index = (index - 1 + cards.length) % cards.length;
  if (mode.value === "normal") flipped = false;
  renderCard();
}

function speakCard() {
  const current = cards[index];
  const text = flipped || mode.value === "back" ? current.back : current.front;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = flipped || mode.value === "back" ? "vi-VN" : "en-US";

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function markWrong() {
  const current = cards[index];

  if (!wrongCards.some(c => c.front === current.front && c.back === current.back)) {
    wrongCards.push(current);
  }

  nextCard();
}

function markRight() {
  const current = cards[index];

  wrongCards = wrongCards.filter(c =>
    !(c.front === current.front && c.back === current.back)
  );

  nextCard();
}

function smartReview() {
  if (wrongCards.length === 0) {
    alert("No wrong cards marked yet.");
    return;
  }

  cards = [...wrongCards];
  index = 0;
  flipped = false;
  renderCard();
}

function resetDeck() {
  cards = [...fullDeck];
  index = 0;
  flipped = false;
  renderCard();
}

let startX = 0;
let startY = 0;
let endX = 0;
let endY = 0;

const cardWrap = document.getElementById("cardWrap");

cardWrap.addEventListener("touchstart", function(e) {
  startX = e.changedTouches[0].screenX;
  startY = e.changedTouches[0].screenY;
});

cardWrap.addEventListener("touchend", function(e) {
  endX = e.changedTouches[0].screenX;
  endY = e.changedTouches[0].screenY;
  handleSwipe();
});

function handleSwipe() {
  const diffX = endX - startX;
  const diffY = endY - startY;

  if (Math.abs(diffX) < 40 && Math.abs(diffY) < 40) return;

  if (Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX < 0) nextCard();
    else prevCard();
  } else {
    flipCard();
  }
}

mode.addEventListener("change", renderCard);
renderCard();
</script>
</body>
</html>
