<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vietnamese Flashcards</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#f2f2f2; display:flex; justify-content:center; }
  .app { width:100%; max-width:480px; padding:16px; }
  h1 { text-align:center; font-size:24px; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  button,select { padding:10px 12px; border:none; border-radius:8px; background:#222; color:white; font-size:14px; }
  button.secondary { background:#666; } button.wrong { background:#b00020; } button.right { background:#087f23; }
  .card-wrap { perspective:1000px; height:320px; touch-action:none; }
  .card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .35s ease; cursor:pointer; }
  .card.flipped { transform:rotateY(180deg); }
  .face { position:absolute; width:100%; height:100%; border-radius:18px; background:white; box-shadow:0 8px 24px rgba(0,0,0,.15); backface-visibility:hidden; display:flex; align-items:center; justify-content:center; text-align:center; padding:28px; box-sizing:border-box; }
  .front,.back { font-size:30px; font-weight:bold; }
  .back { transform:rotateY(180deg); }
  .sub { margin-top:12px; font-size:15px; color:#555; font-weight:normal; }
  .small,.hint { text-align:center; margin-top:10px; color:#555; font-size:13px; }
</style>
</head>
<body>
<div class="app">
  <h1>Vietnamese Flashcards</h1>
  <div class="controls">
    <select id="mode">
      <option value="normal">Flip Mode</option>
      <option value="front">Front Only</option>
      <option value="back">Back Only</option>
    </select>
    <button onclick="speakCard()">🔊 Sound</button>
    <button onclick="markRight()" class="right">Got It</button>
    <button onclick="markWrong()" class="wrong">Wrong</button>
    <button onclick="smartReview()" class="secondary">Smart Review</button>
    <button onclick="resetDeck()" class="secondary">All Cards</button>
  </div>
  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card" onclick="flipCard()">
      <div class="face front"><div><div id="frontText"></div><div class="sub">English</div></div></div>
      <div class="face back"><div><div id="backText"></div><div class="sub">Vietnamese</div></div></div>
    </div>
  </div>
  <div class="small" id="counter"></div>
  <div class="hint">Swipe left/right for cards. Swipe up/down to flip.</div>
</div>
<script>
let cards = [
  
  {
    "front": "What?",
    "back": "Cái gì?"
  },
  {
    "front": "Where?",
    "back": "Ở đâu?"
  },
  {
    "front": "When?",
    "back": "Khi nào?"
  },
  {
    "front": "Why?",
    "back": "Tại sao?"
  },
  {
    "front": "How?",
    "back": "Như thế nào?"
  },
  {
    "front": "What do you want to eat?",
    "back": "Bạn muốn ăn gì?"
  },
  {
    "front": "I want",
    "back": "Tôi muốn"
  },
  {
    "front": "You want",
    "back": "Bạn muốn"
  },
  {
    "front": "Give me one special pho",
    "back": "Cho tôi một phở đặc biệt"
  },
  {
    "front": "I want pho",
    "back": "Tôi muốn phở"
  },
  {
    "front": "I want iced milk coffee",
    "back": "Tôi muốn cà phê sữa đá"
  },
  {
    "front": "Iced milk coffee",
    "back": "Cà phê sữa đá"
  },
  {
    "front": "Milk",
    "back": "Sữa"
  },
  {
    "front": "Ice",
    "back": "Đá"
  },
  {
    "front": "What time is it?",
    "back": "Mấy giờ rồi?"
  },
  {
    "front": "I'm not well",
    "back": "Tôi không khỏe"
  },
  {
    "front": "I have to go",
    "back": "Tôi phải đi"
  },
  {
    "front": "Crosswalk",
    "back": "Lối qua đường"
  },
  {
    "front": "Pedestrian crosswalk",
    "back": "Lối qua đường cho người đi bộ"
  },
  {
    "front": "Please listen",
    "back": "Xin lắng nghe"
  },
  {
    "front": "Please sit down",
    "back": "Xin ngồi xuống"
  }
,
  
  
  { front:"Hello", back:"Xin chào" },
  { front:"Good morning", back:"Chào buổi sáng" },
  { front:"Thank you", back:"Cảm ơn" },
  { front:"Goodbye", back:"Tạm biệt" },
  { front:"How are you?", back:"Bạn có khỏe không?" },
  { front:"How are you? (informal)", back:"Khỏe không?" },
  { front:"I am well", back:"Tôi khỏe" },
  { front:"My name is Yuyu Chen", back:"Tôi tên là Yuyu Chen" },
  { front:"I am a teacher", back:"Tôi là giáo viên" },
  { front:"Have you eaten yet?", back:"Bạn ăn chưa?" },
  { front:"Lunch / to eat lunch", back:"Ăn trưa" },
  { front:"That's right", back:"Đúng rồi" },
  { front:"Good job", back:"Làm tốt lắm" },
  { front:"I like chicken", back:"Tôi thích gà" },
  { front:"I like fish", back:"Tôi thích cá" },
  { front:"I like coffee", back:"Tôi thích cà phê" },
  { front:"Give me one special phở", back:"Cho tôi một phở đặc biệt" },
  { front:"1", back:"Một" }, { front:"2", back:"Hai" }, { front:"3", back:"Ba" },
  { front:"4", back:"Bốn" }, { front:"5", back:"Năm" }, { front:"6", back:"Sáu" },
  { front:"7", back:"Bảy" }, { front:"8", back:"Tám" }, { front:"9", back:"Chín" },
  { front:"10", back:"Mười" }, { front:"11", back:"Mười một" }, { front:"12", back:"Mười hai" },
  { front:"13", back:"Mười ba" }, { front:"14", back:"Mười bốn" }, { front:"15", back:"Mười lăm" },
  { front:"16", back:"Mười sáu" }, { front:"17", back:"Mười bảy" }, { front:"18", back:"Mười tám" },
  { front:"19", back:"Mười chín" }, { front:"20", back:"Hai mươi" }, { front:"21", back:"Hai mươi mốt" },
  { front:"30", back:"Ba mươi" }, { front:"31", back:"Ba mươi mốt" }, { front:"40", back:"Bốn mươi" },
  { front:"Red", back:"Đỏ" },
  { front:"Green / blue (depending on context)", back:"Xanh" },
  { front:"Green (specific)", back:"Xanh lá cây" },
  { front:"Yellow", back:"Vàng" },
  { front:"Red light", back:"Đèn đỏ" },
  { front:"Yellow light", back:"Đèn vàng" },
  { front:"Green light", back:"Đèn xanh" },
  { front:"Traffic", back:"Giao thông" },
  { front:"Traffic jam", back:"Kẹt xe" },
  { front:"Vehicle / car", back:"Xe" },
  { front:"Fast", back:"Nhanh" },
  { front:"Bridge", back:"Cây cầu" },
  { front:"Tunnel", back:"Đường hầm" },
  { front:"Tree", back:"Cây" },
  { front:"Highway / expressway", back:"Cao tốc" },
  { front:"Highway exit", back:"Lối ra cao tốc" },
  { front:"Airplane", back:"Máy bay" },
  { front:"Police", back:"Cảnh sát" },
  { front:"Pedestrian", back:"Người đi bộ" },
  { front:"The car is very fast", back:"Chiếc xe rất nhanh" },
  { front:"Dangerous", back:"Nguy hiểm" },
  { front:"The road is dangerous", back:"Con đường nguy hiểm" },
  { front:"The highway is very dangerous", back:"Cao tốc rất nguy hiểm" },
  { front:"I am sleepy", back:"Tôi buồn ngủ" },
  { front:"I am crazy", back:"Tôi điên" },
  { front:"I have gone crazy / I am insane", back:"Tôi bị điên" },
  { front:"I am unlucky", back:"Tôi không may mắn" },
  { front:"You are silly", back:"Bạn ngốc" },
  { front:"You look nice", back:"Bạn trông đẹp" },
  { front:"You are beautiful", back:"Bạn đẹp quá" },
  { front:"You are beautiful (familiar / flirty)", back:"Em đẹp quá" },
  { front:"You are very attractive", back:"Em quyến rũ quá" },
  { front:"I love you (male to female)", back:"Anh yêu em" },
  { front:"I love you (female to male)", back:"Em yêu anh" },
  { front:"I want to go to the bathroom", back:"Tôi muốn đi vệ sinh" },
  { front:"I want to pee", back:"Tôi muốn đi tiểu" },
  { front:"I want to poop (formal)", back:"Tôi muốn đi đại tiện" },
  { front:"I peed my pants", back:"Tôi tè ra quần" },
  { front:"I started learning Vietnamese", back:"Tôi bắt đầu học tiếng Việt" },
  { front:"I am learning Vietnamese", back:"Tôi đang học tiếng Việt" },
  { front:"To start / begin", back:"Bắt đầu" },
  { front:"To study / learn", back:"Học" },
  { front:"Vietnamese language", back:"Tiếng Việt" },
  { front:"Today", back:"Hôm nay" },
  { front:"It is summertime now", back:"Bây giờ là mùa hè" },
  { front:"It is cloudy", back:"Trời nhiều mây" },
  { front:"University", back:"Đại học" },
  { front:"Northeastern University", back:"Đại học Northeastern" },
  { front:"Phone", back:"Điện thoại" },
  { front:"Cell phone", back:"Điện thoại di động" },
  { front:"No cell phones in class", back:"Không dùng điện thoại trong lớp học" },
  { front:"Cell phones prohibited", back:"Cấm dùng điện thoại" },
  { front:"Don't use your phone", back:"Đừng dùng điện thoại" },
  { front:"Parking meter", back:"Đồng hồ đậu xe" },
  { front:"To park", back:"Đậu xe" },
  { front:"Parking space", back:"Chỗ đậu xe" },
  { front:"I need to find a parking space", back:"Tôi cần tìm chỗ đậu xe" }
];
let fullDeck=[...cards], wrongCards=[], index=0, flipped=false;
const card=document.getElementById("card"), frontText=document.getElementById("frontText"), backText=document.getElementById("backText"), counter=document.getElementById("counter"), mode=document.getElementById("mode");
function renderCard(){ if(!cards.length)return; frontText.textContent=cards[index].front; backText.textContent=cards[index].back; if(mode.value==="front")flipped=false; if(mode.value==="back")flipped=true; card.classList.toggle("flipped",flipped); counter.textContent=`${index+1} / ${cards.length}`; }
function flipCard(){ if(mode.value!=="normal")return; flipped=!flipped; renderCard(); }
function nextCard(){ index=(index+1)%cards.length; if(mode.value==="normal")flipped=false; renderCard(); }
function prevCard(){ index=(index-1+cards.length)%cards.length; if(mode.value==="normal")flipped=false; renderCard(); }
function speakCard(){ const current=cards[index]; const text=flipped||mode.value==="back"?current.back:current.front; const u=new SpeechSynthesisUtterance(text); u.lang=flipped||mode.value==="back"?"vi-VN":"en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }
function markWrong(){ const c=cards[index]; if(!wrongCards.some(x=>x.front===c.front&&x.back===c.back))wrongCards.push(c); nextCard(); }
function markRight(){ const c=cards[index]; wrongCards=wrongCards.filter(x=>!(x.front===c.front&&x.back===c.back)); nextCard(); }
function smartReview(){ if(!wrongCards.length){alert("No wrong cards marked yet.");return;} cards=[...wrongCards]; index=0; flipped=false; renderCard(); }
function resetDeck(){ cards=[...fullDeck]; index=0; flipped=false; renderCard(); }
let startX=0,startY=0,endX=0,endY=0; const cardWrap=document.getElementById("cardWrap");
cardWrap.addEventListener("touchstart",e=>{startX=e.changedTouches[0].screenX;startY=e.changedTouches[0].screenY;});
cardWrap.addEventListener("touchend",e=>{endX=e.changedTouches[0].screenX;endY=e.changedTouches[0].screenY;handleSwipe();});
function handleSwipe(){ const dx=endX-startX,dy=endY-startY; if(Math.abs(dx)<40&&Math.abs(dy)<40)return; if(Math.abs(dx)>Math.abs(dy)){dx<0?nextCard():prevCard();}else flipCard(); }
mode.addEventListener("change",renderCard); renderCard();
</script>
</body>
</html>
