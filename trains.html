<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Train Switcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 {
            margin: 5px 0 2px 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f1c40f;
            text-align: center;
        }

        p {
            margin: 0 0 10px 0;
            color: #bdc3c7;
            font-size: 0.85rem;
            text-align: center;
            padding: 0 10px;
        }

        #gameContainer {
            position: relative;
            width: 95vw;
            max-width: 400px;
            height: 80vh;
            max-height: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            background-color: #34495e;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }

        .ui-overlay {
            position: absolute;
            top: 12px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
        }

        #gameOverScreen h2 {
            color: #e74c3c;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        #gameOverScreen button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Route Switcher</h1>
    <p>Tap near a house or its track branch to route the trains!</p>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="650"></canvas>
        
        <div class="ui-overlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="livesDisplay">Lives: ❤️❤️❤️</div>
        </div>

        <div id="gameOverScreen">
            <h2>Game Over</h2>
            <p id="finalScore" style="font-size: 1.1rem;">Your final score: 0</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');

        const COLORS = { red: '#e74c3c', green: '#2ecc71', blue: '#3498db' };
        const COLOR_KEYS = ['red', 'green', 'blue'];

        // Core Layout Coordinates (Vertical flow)
        const nodes = {
            tunnel: { x: 200, y: 40 },
            switch1: { x: 200, y: 180 },
            switch2: { x: 200, y: 400 },
            house0: { id: 0, colorKey: 'red', x: 80, y: 180 },     // Left branch 1
            house1: { id: 1, colorKey: 'green', x: 320, y: 400 },   // Right branch 2
            house2: { id: 2, colorKey: 'blue', x: 200, y: 580 }     // Dead end bottom
        };

        let score = 0;
        let lives = 3;
        let trains = [];
        let activeRoute = 2; // 0: House Red, 1: House Green, 2: House Blue
        let gameOver = false;
        let lastSpawnTime = 0;
        let spawnInterval = 3800; 

        // Handle Touch/Click inputs optimized for mobile tapping targets
        canvas.addEventListener('click', function(event) {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            // Translate screen touches accurately to our internal 400x650 coordinate canvas space
            const touchX = ((event.clientX - rect.left) / rect.width) * canvas.width;
            const touchY = ((event.clientY - rect.top) / rect.height) * canvas.height;

            // Determine which house route the user is trying to hit based on touch height/sides
            if (touchY < 260) {
                activeRoute = 0; // Route to Upper Red House
            } else if (touchY >= 260 && touchY < 480) {
                activeRoute = 1; // Route to Middle Green House
            } else {
                activeRoute = 2; // Route to Bottom Blue House
            }
        });

        class Train {
            constructor() {
                this.colorKey = COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)];
                this.color = COLORS[this.colorKey];
                this.x = nodes.tunnel.x;
                this.y = nodes.tunnel.y;
                this.speed = 1.3 + (score * 0.06); 
                
                // Track path generation using waypoint node injection 
                this.waypoints = [nodes.tunnel, nodes.switch1];
                this.currentWaypointIdx = 0;
            }

            update() {
                let target = this.waypoints[this.currentWaypointIdx + 1];
                
                // If the train arrives at a decision point switch, dynamically look up active player choice
                if (!target) {
                    if (this.waypoints[this.currentWaypointIdx] === nodes.switch1) {
                        if (activeRoute === 0) {
                            this.waypoints.push(nodes.house0);
                        } else {
                            this.waypoints.push(nodes.switch2);
                        }
                    } else if (this.waypoints[this.currentWaypointIdx] === nodes.switch2) {
                        if (activeRoute === 1) {
                            this.waypoints.push(nodes.house1);
                        } else {
                            this.waypoints.push(nodes.house2);
                        }
                    } else {
                        // Reached a final destination house terminal
                        this.arrive(this.waypoints[this.currentWaypointIdx]);
                        return false; 
                    }
                    target = this.waypoints[this.currentWaypointIdx + 1];
                }

                // Vector calculation for movement heading toward current targeted node waypoint
                let dx = target.x - this.x;
                let dy = target.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist <= this.speed) {
                    this.x = target.x;
                    this.y = target.y;
                    this.currentWaypointIdx++;
                } else {
                    this.angle = Math.atan2(dy, dx);
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
                return true;
            }

            arrive(house) {
                if (this.colorKey === house.colorKey) {
                    score++;
                    scoreDisplay.innerText = "Score: " + score;
                } else {
                    lives--;
                    updateLivesDisplay();
                    if (lives <= 0) endGame();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.angle !== undefined) ctx.rotate(this.angle);

                // Chassis
                ctx.fillStyle = this.color;
                ctx.fillRect(-22, -10, 32, 18);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(2, -6, 6, 5); // Window

                // Smoke stack & features
                ctx.fillStyle = '#444';
                ctx.fillRect(4, -14, 3, 6);

                // Wheels
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(-12, 9, 4, 0, Math.PI * 2);
                ctx.arc(2, 9, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function drawTrackSegment(from, to, isActive) {
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.lineWidth = isActive ? 6 : 3;
            ctx.strokeStyle = isActive ? '#f1c40f' : '#7f8c8d';
            ctx.setLineDash([6, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawHouse(house) {
            ctx.save();
            ctx.translate(house.x, house.y);

            // House Base Structure
            ctx.fillStyle = COLORS[house.colorKey];
            ctx.fillRect(-18, -10, 36, 30);

            // Roof line
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.moveTo(-24, -10);
            ctx.lineTo(0, -28);
            ctx.lineTo(24, -10);
            ctx.closePath();
            ctx.fill();

            // Door panel
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(-5, 8, 10, 12);

            ctx.restore();
        }

        function drawBackgroundElements() {
            // Determine active tracking highlights for the sequential systems
            const r0Active = (activeRoute === 0);
            const r1Active = (activeRoute === 1);
            const r2Active = (activeRoute === 2);

            // Trunk Line 1 (Tunnel down to Switch 1)
            drawTrackSegment(nodes.tunnel, nodes.switch1, true);

            // Branching System 1 (Switch 1 out to Red House or going down)
            drawTrackSegment(nodes.switch1, nodes.house0, r0Active);
            drawTrackSegment(nodes.switch1, nodes.switch2, r1Active || r2Active);

            // Branching System 2 (Switch 2 out to Green House or going to Blue House)
            drawTrackSegment(nodes.switch2, nodes.house1, r1Active);
            drawTrackSegment(nodes.switch2, nodes.house2, r2Active);

            // Mechanical Junction Nodes Visualizers
            [nodes.switch1, nodes.switch2].forEach(sw => {
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#e67e22';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // The Entry Tunnel
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(nodes.tunnel.x - 30, 0, 60, nodes.tunnel.y);
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(nodes.tunnel.x, nodes.tunnel.y, 20, Math.PI, 0);
            ctx.fill();

            // Draw Houses Destination Structures
            drawHouse(nodes.house0);
            drawHouse(nodes.house1);
            drawHouse(nodes.house2);
        }

        function gameLoop(timestamp) {
            if (gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackgroundElements();

            if (!lastSpawnTime) lastSpawnTime = timestamp;
            const elapsed = timestamp - lastSpawnTime;
            
            // Dynamic acceleration scaling rules
            let dynamicInterval = Math.max(1600, spawnInterval - (score * 110));
            if (elapsed >= dynamicInterval) {
                trains.push(new Train());
                lastSpawnTime = timestamp;
            }

            trains = trains.filter(train => {
                const keep = train.update();
                if (keep) train.draw();
                return keep;
            });

            requestAnimationFrame(gameLoop);
        }

        function updateLivesDisplay() {
            let hearts = "";
            for (let i = 0; i < 3; i++) hearts += i < lives ? "❤️" : "🖤";
            livesDisplay.innerText = "Lives: " + hearts;
        }

        function endGame() {
            gameOver = true;
            finalScore.innerText = "Your final score: " + score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            lives = 3;
            trains = [];
            activeRoute = 2;
            gameOver = false;
            lastSpawnTime = 0;
            scoreDisplay.innerText = "Score: 0";
            updateLivesDisplay();
            gameOverScreen.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        updateLivesDisplay();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
