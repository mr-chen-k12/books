<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clockwise Memory Grid</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --card-back: #0f3460;
            --accent-color: #e94560;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffd2;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #grid-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px auto;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 10px;
        }

        .card {
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: var(--card-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
            border: 2px solid transparent;
        }

        /* Clockwise Grid Positions */
        .pos-tl { top: 10px; left: 10px; }
        .pos-tr { top: 10px; left: 170px; border-color: #00ffd2; box-shadow: 0 0 15px rgba(0, 255, 210, 0.4); }
        .pos-br { top: 170px; left: 170px; }
        /* BL keeps a neon outline so the user knows it's the target mystery card */
        .pos-bl { top: 170px; left: 10px; border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }

        /* Card Face States */
        .card .face-down {
            width: 100%;
            height: 100%;
            background-color: var(--card-back);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(255,255,255,0.3);
            font-weight: bold;
        }

        .card .face-up {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        svg {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        /* Controls */
        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-yes { background-color: #00ffd2; color: #111; }
        .btn-no { background-color: #ff007f; color: #fff; }

        #feedback {
            margin-top: 15px;
            height: 24px;
            font-size: 18px;
            font-weight: bold;
            transition: color 0.2s;
        }
        
        .correct { color: #00ffd2; }
        .wrong { color: #ff007f; }

        /* Zone Labels */
        .zone-label {
            position: absolute;
            font-size: 10px;
            text-transform: uppercase;
            pointer-events: none;
        }
        .lbl-tr { top: 15px; left: 175px; z-index: 10; color: #00ffd2;}
        .lbl-bl { top: 175px; left: 15px; z-index: 10; color: #ff007f;}
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Memory Grid Rotator</h1>
        
        <div id="scoreboard">
            <div>Score: <span id="score">0</span></div>
            <div>Streak: <span id="streak">0</span></div>
        </div>

        <div id="grid-wrapper">
            <div class="zone-label lbl-tr">Visible New Card</div>
            <div class="zone-label lbl-bl">Remembered Card?</div>
            
            </div>

        <div id="controls">
            <button class="btn-no" onclick="handleChoice(false)">No</button>
            <button class="btn-yes" onclick="handleChoice(true)">Yes</button>
        </div>

        <div id="feedback"></div>
    </div>

<script>
    // 3 custom shapes with distinct colors
    const ASSETS = [
        {
            id: 1,
            shape: 'circle',
            color: '#FF4136',
            svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#FF4136" /></svg>`
        },
        {
            id: 2,
            shape: 'square',
            color: '#0074D9',
            svg: `<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" fill="#0074D9" rx="10" /></svg>`
        },
        {
            id: 3,
            shape: 'triangle',
            color: '#2ECC40',
            svg: `<svg viewBox="0 0 100 100"><polygon points="50,15 85,85 15,85" fill="#2ECC40" /></svg>`
        }
    ];

    // Grid Positions: 0 = TL, 1 = TR, 2 = BR, 3 = BL
    const POSITION_CLASSES = ['pos-tl', 'pos-tr', 'pos-br', 'pos-bl'];
    
    let gridData = [null, null, null, null]; 
    let score = 0;
    let streak = 0;
    let isTransitioning = false;

    const wrapper = document.getElementById('grid-wrapper');
    const scoreEl = document.getElementById('score');
    const streakEl = document.getElementById('streak');
    const feedbackEl = document.getElementById('feedback');
    const buttons = document.querySelectorAll('#controls button');

    function getRandomAsset() {
        return ASSETS[Math.floor(Math.random() * ASSETS.length)];
    }

    // Create a DOM card instance
    function createCardElement(asset, positionIndex) {
        const card = document.createElement('div');
        card.className = `card ${POSITION_CLASSES[positionIndex]}`;
        
        // MODIFICATION: Only the Top-Right (Index 1) is revealed. 
        // Bottom-Left (Index 3) is now face-down.
        if (positionIndex === 1) {
            card.innerHTML = `<div class="face-up">${asset.svg}</div>`;
        } else {
            card.innerHTML = `<div class="face-down">?</div>`;
        }
        
        return card;
    }

    // Initialize the grid
    function initGame() {
        gridData = [];
        for (let i = 0; i < 4; i++) {
            const asset = getRandomAsset();
            const element = createCardElement(asset, i);
            wrapper.appendChild(element);
            gridData.push({ asset, element });
        }
    }

    // Input evaluation
    function handleChoice(userGuessedMatch) {
        if (isTransitioning) return;
        
        // Compares the underlying data of Top-Right (1) and Bottom-Left (3)
        const trAsset = gridData[1].asset;
        const blAsset = gridData[3].asset;
        const isActualMatch = (trAsset.id === blAsset.id);

        if (userGuessedMatch === isActualMatch) {
            score += 10;
            streak++;
            showFeedback("Correct!", "correct");
        } else {
            streak = 0;
            showFeedback("Wrong!", "wrong");
        }

        updateUI();
        rotateGrid();
    }

    function showFeedback(text, className) {
        feedbackEl.innerText = text;
        feedbackEl.className = className;
    }

    function updateUI() {
        scoreEl.innerText = score;
        streakEl.innerText = streak;
    }

    // Clockwise shift engine
    function rotateGrid() {
        isTransitioning = true;
        buttons.forEach(b => b.disabled = true);

        // 1. Fade out and remove the card leaving Bottom-Left (Index 3)
        const exitingCard = gridData[3];
        exitingCard.element.style.opacity = 0;
        exitingCard.element.style.transform = 'scale(0.5)';
        setTimeout(() => exitingCard.element.remove(), 500);

        // 2. Shift references in the array clockwise
        const nextGridData = new Array(4);
        nextGridData[1] = gridData[0]; // TL -> TR
        nextGridData[2] = gridData[1]; // TR -> BR
        nextGridData[3] = gridData[2]; // BR -> BL

        // 3. Update CSS classes and card visibility states
        for (let i = 1; i < 4; i++) {
            const item = nextGridData[i];
            item.element.className = `card ${POSITION_CLASSES[i]}`;
            
            // MODIFICATION: Only show asset if it has arrived at Top-Right (Index 1)
            if (i === 1) {
                item.element.innerHTML = `<div class="face-up">${item.asset.svg}</div>`;
            } else {
                item.element.innerHTML = `<div class="face-down">?</div>`;
            }
        }

        // 4. Spawn new mystery card at Top-Left (Index 0)
        const newAsset = getRandomAsset();
        const newElement = createCardElement(newAsset, 0);
        
        newElement.style.opacity = 0;
        newElement.style.transform = 'scale(0.8)';
        wrapper.appendChild(newElement);
        
        void newElement.offsetWidth; // Trigger reflow
        newElement.style.opacity = 1;
        newElement.style.transform = 'scale(1)';

        nextGridData[0] = { asset: newAsset, element: newElement };
        gridData = nextGridData;

        // Unlock buttons after transition finishes
        setTimeout(() => {
            isTransitioning = false;
            buttons.forEach(b => b.disabled = false);
        }, 500);
    }

    initGame();
</script>

</body>
</html>
