<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Chess (Xiangqi)</title>
    <style>
        :root {
            /* Desktop Defaults */
            --cell-size: 52px;
            --piece-size: 46px;
            
            --board-bg: #e6b87d;
            --line-color: #4a2e1b;
            --red-piece: #cc3333;
            --black-piece: #222222;
            --piece-bg: #f7e6c4;
        }

        /* Dynamic scaling for mobile screens (like iPhone 16 Pro) */
        @media (max-width: 500px) {
            :root {
                --cell-size: 10.5vw;
                --piece-size: 9.2vw;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2f3542;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            touch-action: manipulation;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        #status {
            font-size: 1rem;
            margin-bottom: 15px;
            padding: 5px 15px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }

        /* Main Container */
        .board-container {
            position: relative;
            background-color: var(--board-bg);
            padding: 25px; /* Outer boundary padding */
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px double var(--line-color);
            display: inline-block;
        }

        /* Visual Grid Layer (Cells) */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            border: 2px solid var(--line-color);
            position: relative;
            box-sizing: content-box;
        }

        .cell {
            border-right: 1px solid var(--line-color);
            border-bottom: 1px solid var(--line-color);
            box-sizing: border-box;
        }

        .cell:nth-child(8n) { border-right: none; }
        .cell:nth-child(n+73) { border-bottom: none; }

        /* Unified Master Background Layer for Board Markings */
        .decorations-layer {
            position: absolute;
            top: 27px; /* 25px padding + 2px grid border */
            left: 27px;
            width: calc(8 * var(--cell-size));
            height: calc(9 * var(--cell-size));
            pointer-events: none;
        }

        /* The River */
        .river {
            position: absolute;
            top: calc(4 * var(--cell-size));
            left: 0;
            width: 100%;
            height: var(--cell-size);
            background-color: var(--board-bg);
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: calc(var(--cell-size) * 0.38);
            font-weight: bold;
            color: var(--line-color);
            letter-spacing: 4px;
        }

        /* Palaces (The X Marks) */
        .diagonal-palace-top, .diagonal-palace-bottom {
            position: absolute;
            width: calc(2 * var(--cell-size));
            height: calc(2 * var(--cell-size));
            left: calc(3 * var(--cell-size));
        }
        
        .diagonal-palace-top {
            top: 0;
            background: 
                linear-gradient(to top right, transparent 48.5%, var(--line-color) 48.5%, var(--line-color) 51.5%, transparent 51.5%),
                linear-gradient(to top left, transparent 48.5%, var(--line-color) 48.5%, var(--line-color) 51.5%, transparent 51.5%);
        }
        
        .diagonal-palace-bottom {
            bottom: 0;
            background: 
                linear-gradient(to top right, transparent 48.5%, var(--line-color) 48.5%, var(--line-color) 51.5%, transparent 51.5%),
                linear-gradient(to top left, transparent 48.5%, var(--line-color) 48.5%, var(--line-color) 51.5%, transparent 51.5%);
        }

        /* Master Coordinate Layer for Interactive Pieces */
        .intersections-layer {
            position: absolute;
            top: 27px; /* Matches the decorations layer perfectly */
            left: 27px;
            pointer-events: none; 
        }

        /* Click Zones mapped directly to line coordinate intersections */
        .click-zone {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            transform: translate(-50%, -50%); /* Centers the click target perfectly over crosshairs */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .click-zone:hover {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
        }

        .click-zone.selected .piece {
            transform: scale(1.1);
            box-shadow: 0 0 15px #ffd700;
            border-color: #ffd700;
        }

        /* Pieces Styling */
        .piece {
            width: var(--piece-size);
            height: var(--piece-size);
            border-radius: 50%;
            background-color: var(--piece-bg);
            border: 2px solid var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--piece-size) * 0.55);
            font-weight: bold;
            user-select: none;
            box-shadow: 2px 3px 5px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .piece.red {
            color: var(--red-piece);
            border-color: var(--red-piece);
        }

        .piece.black {
            color: var(--black-piece);
            border-color: var(--black-piece);
        }

        button {
            margin: 20px 0;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #1e90ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3742fa;
        }
    </style>
</head>
<body>

    <h1>象棋 · Xiangqi</h1>
    <div id="status">Red's Turn</div>

    <div class="board-container">
        <div class="board-grid" id="boardGrid"></div>
        
        <div class="decorations-layer">
            <div class="river"><span>楚河</span><span>漢界</span></div>
            <div class="diagonal-palace-top"></div>
            <div class="diagonal-palace-bottom"></div>
        </div>

        <div class="intersections-layer" id="intersectionsLayer"></div>
    </div>

    <button onclick="resetGame()">Restart Game</button>

    <script>
        const RED = 'red';
        const BLACK = 'black';
        let currentTurn = RED;
        let selectedSquare = null;

        let boardState = Array(10).fill(null).map(() => Array(9).fill(null));

        const pieceNames = {
            'BC': { text: '車', side: BLACK }, 'BH': { text: '馬', side: BLACK }, 'BE': { text: '象', side: BLACK }, 'BA': { text: '士', side: BLACK }, 'BG': { text: '將', side: BLACK }, 'BP': { text: '砲', side: BLACK }, 'BS': { text: '卒', side: BLACK },
            'RC': { text: '車', side: RED },   'RH': { text: '傌', side: RED },   'RE': { text: '相', side: RED },   'RA': { text: '仕', side: RED },   'RG': { text: '帥', side: RED },   'RP': { text: '炮', side: RED },   'RS': { text: '兵', side: RED }
        };

        function initBoardState() {
            boardState = Array(10).fill(null).map(() => Array(9).fill(null));
            
            // Black Team
            boardState[0] = ['BC', 'BH', 'BE', 'BA', 'BG', 'BA', 'BE', 'BH', 'BC'];
            boardState[2][1] = 'BP'; boardState[2][7] = 'BP';
            boardState[3] = ['BS', null, 'BS', null, 'BS', null, 'BS', null, 'BS'];

            // Red Team
            boardState[9] = ['RC', 'RH', 'RE', 'RA', 'RG', 'RA', 'RE', 'RH', 'RC'];
            boardState[7][1] = 'RP'; boardState[7][7] = 'RP';
            boardState[6] = ['RS', null, 'RS', null, 'RS', null, 'RS', null, 'RS'];
        }

        function createGridBackground() {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 72; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                grid.appendChild(cell);
            }
        }

        function renderIntersections() {
            const layer = document.getElementById('intersectionsLayer');
            layer.innerHTML = '';

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const clickZone = document.createElement('div');
                    clickZone.classList.add('click-zone');
                    
                    clickZone.style.left = `calc(${c} * var(--cell-size))`;
                    clickZone.style.top = `calc(${r} * var(--cell-size))`;
                    
                    clickZone.dataset.row = r;
                    clickZone.dataset.col = c;
                    clickZone.addEventListener('click', handleSquareClick);

                    const pieceKey = boardState[r][c];
                    if (pieceKey) {
                        const pieceData = pieceNames[pieceKey];
                        const pieceEl = document.createElement('div');
                        pieceEl.classList.add('piece', pieceData.side);
                        pieceEl.innerText = pieceData.text;
                        clickZone.appendChild(pieceEl);
                    }

                    if (selectedSquare && selectedSquare.row === r && selectedSquare.col === c) {
                        clickZone.classList.add('selected');
                    }

                    layer.appendChild(clickZone);
                }
            }
        }

        function handleSquareClick(e) {
            const zone = e.currentTarget;
            const r = parseInt(zone.dataset.row);
            const c = parseInt(zone.dataset.col);
            const clickedPiece = boardState[r][c];

            if (selectedSquare) {
                if (clickedPiece && pieceNames[clickedPiece].side === currentTurn) {
                    selectedSquare = { row: r, col: c };
                    renderIntersections();
                    return;
                }

                const originalPiece = boardState[selectedSquare.row][selectedSquare.col];
                boardState[r][c] = originalPiece;
                boardState[selectedSquare.row][selectedSquare.col] = null;
                
                currentTurn = currentTurn === RED ? BLACK : RED;
                document.getElementById('status').innerText = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s Turn`;
                
                selectedSquare = null;
                renderIntersections();
            } else {
                if (clickedPiece && pieceNames[clickedPiece].side === currentTurn) {
                    selectedSquare = { row: r, col: c };
                    zone.classList.add('selected');
                }
            }
        }

        function resetGame() {
            currentTurn = RED;
            selectedSquare = null;
            document.getElementById('status').innerText = "Red's Turn";
            initBoardState();
            renderIntersections();
        }

        createGridBackground();
        initBoardState();
        renderIntersections();
    </script>
</body>
</html>
